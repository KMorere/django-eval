<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}MySkills{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'skills/style.css' %}">
</head>
<body>
    <header id="headbar">
        {% block headbar %}
        <ul>
            <li><a href="{% url 'skills:home' %}">Home</a></li>
            <li><a href="{% url 'skills:all' %}">Skills</a></li>

            {% if not user.is_authenticated %}
            <li><a href="{% url 'login' %}">Login</a></li>
            {% else %}
            <li><form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit">
                    Logout</button>
            </form></li>
            {% endif %}
        </ul>
        {% endblock %}
    </header>

    <main id="content">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
