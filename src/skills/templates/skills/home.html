{% extends "base.html" %}

{% block title %}{{ block.super }} - Home{% endblock %}

{% block content %}
    <form method="get">
    {% csrf_token %}
        <input type="text" name="search" placeholder="Search skills..." value="{{skills}}">
        <button type="submit">Search</button>
    </form>
{% if profiles %}
    <h3>Profiles :</h3>
    <ul>
        {% for profile in profiles %}
            <li><a>
                {{profile}}
            </a></li>
        {% endfor %}
    </ul>
{% else %}
    <h3>No profiles available.</h3>
{% endif %}
{% endblock %}
